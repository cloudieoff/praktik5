<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание абитуриента</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function addExamRow() {
            var container = document.getElementById("examScoresContainer");
            var index = container.children.length;
            var div = document.createElement("div");
            div.innerHTML = `
                <label>Предмет: <input type="text" name="examScores[${index}].subject" /></label>
                <label>Оценка: <input type="number" name="examScores[${index}].score" min="0" max="100" /></label>
                <button type="button" onclick="removeExamRow(this)">Удалить</button>
            `;
            container.appendChild(div);
        }
        function removeExamRow(btn) {
            btn.parentElement.remove();
        }
    </script>
</head>
<body>
<h1>Создание абитуриента</h1>
<form th:action="@{/applicants/create}" th:object="${applicantCreateDto}" method="post">
    <!-- Основные поля -->
    <div>
        <label>Фамилия: <input type="text" th:field="*{lastName}" /></label>
        <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red"></div>
    </div>
    <div>
        <label>Имя: <input type="text" th:field="*{firstName}" /></label>
        <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color:red"></div>
    </div>
    <div>
        <label>Отчество: <input type="text" th:field="*{middleName}" /></label>
    </div>
    <div>
        <label>Пол:
            <select th:field="*{gender}">
                <option value="MALE">Мужской</option>
                <option value="FEMALE">Женский</option>
            </select>
        </label>
        <div th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" style="color:red"></div>
    </div>
    <div>
        <label>Национальность: <input type="text" th:field="*{nationality}" /></label>
    </div>
    <div>
        <label>Дата рождения: <input type="date" th:field="*{birthDate}" /></label>
        <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" style="color:red"></div>
    </div>

    <!-- Адрес -->
    <fieldset>
        <legend>Адрес</legend>
        <div><label>Почтовый индекс: <input type="text" th:field="*{postalCode}" /></label></div>
        <div><label>Страна: <input type="text" th:field="*{country}" /></label></div>
        <div><label>Область: <input type="text" th:field="*{region}" /></label></div>
        <div><label>Район: <input type="text" th:field="*{district}" /></label></div>
        <div><label>Город: <input type="text" th:field="*{city}" /></label></div>
        <div><label>Улица: <input type="text" th:field="*{street}" /></label></div>
        <div><label>Дом: <input type="text" th:field="*{house}" /></label></div>
        <div><label>Квартира: <input type="text" th:field="*{apartment}" /></label></div>
    </fieldset>

    <!-- Оценки -->
    <fieldset>
        <legend>Оценки по экзаменам</legend>
        <div id="examScoresContainer">
            <div th:each="es, iter : *{examScores}" th:field="*{examScores[__${iter.index}__]}">
                <label>Предмет: <input type="text" th:field="*{examScores[__${iter.index}__].subject}" /></label>
                <label>Оценка: <input type="number" th:field="*{examScores[__${iter.index}__].score}" min="0" max="100" /></label>
                <button type="button" onclick="removeExamRow(this)">Удалить</button>
            </div>
        </div>
        <button type="button" onclick="addExamRow()">➕ Добавить экзамен</button>
    </fieldset>

    <div>
        <label>Проходной балл: <input type="number" step="0.1" th:field="*{passingScore}" /></label>
    </div>

    <div>
        <input type="submit" value="✅ Создать" />
        <input type="reset" value="🔄 Сброс" />
    </div>
</form>
<br>
<a th:href="@{/applicants}">⬅️ Назад к списку</a>
</body>
</html>
