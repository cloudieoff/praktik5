<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Детали студента</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Детали студента</h1>
<div>
    <p><strong>Фамилия:</strong> <span th:text="${student.lastName}"></span></p>
    <p><strong>Имя:</strong> <span th:text="${student.firstName}"></span></p>
    <p><strong>Отчество:</strong> <span th:text="${student.middleName}"></span></p>
    <p><strong>Пол:</strong> <span th:text="${student.gender}"></span></p>
    <p><strong>Дата рождения:</strong> <span th:text="${student.birthDate}"></span></p>
    <p><strong>Возраст:</strong> <span th:text="${student.age}"></span></p>
    <p><strong>Национальность:</strong> <span th:text="${student.nationality}"></span></p>
    <p><strong>Рост:</strong> <span th:text="${student.height}"></span></p>
    <p><strong>Вес:</strong> <span th:text="${student.weight}"></span></p>
    <p><strong>Телефон:</strong> <span th:text="${student.phone}"></span></p>
    <p><strong>Адрес:</strong> <span th:text="${student.address}"></span></p>
    <p><strong>Группа:</strong> <span th:text="${student.group != null ? student.group.name : ''}"></span></p>
    <p><strong>Факультет:</strong> <span th:text="${student.faculty != null ? student.faculty.name : ''}"></span></p>
    <p><strong>Курс:</strong> <span th:text="${student.course}"></span></p>
    <p><strong>Средний балл:</strong> <span th:text="${student.averageScore}"></span></p>
    <p><strong>Специальность:</strong> <span th:text="${student.specialty}"></span></p>
</div>
<br>
<a th:href="@{/students}">⬅️ Назад к списку</a>
</body>
</html>
