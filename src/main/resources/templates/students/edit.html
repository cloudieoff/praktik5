<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование студента</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Редактирование студента</h1>
<form th:action="@{/students/edit}" th:object="${studentEditDto}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <!-- Все поля такие же, как в create -->
    <div>
        <label>Фамилия: <input type="text" th:field="*{lastName}"/></label>
        <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red"></div>
    </div>
    <div>
        <label>Имя: <input type="text" th:field="*{firstName}"/></label>
        <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color:red"></div>
    </div>
    <div>
        <label>Отчество: <input type="text" th:field="*{middleName}"/></label>
    </div>
    <div>
        <label>Пол:
            <select th:field="*{gender}">
                <option value="MALE">Мужской</option>
                <option value="FEMALE">Женский</option>
            </select>
        </label>
        <div th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" style="color:red"></div>
    </div>
    <div>
        <label>Дата рождения: <input type="date" th:field="*{birthDate}"/></label>
        <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" style="color:red"></div>
    </div>
    <div>
        <label>Возраст: <input type="number" th:field="*{age}"/></label>
        <div th:if="${#fields.hasErrors('age')}" th:errors="*{age}" style="color:red"></div>
    </div>
    <div>
        <label>Национальность: <input type="text" th:field="*{nationality}"/></label>
    </div>
    <div>
        <label>Рост: <input type="number" step="0.01" th:field="*{height}"/></label>
    </div>
    <div>
        <label>Вес: <input type="number" step="0.01" th:field="*{weight}"/></label>
    </div>
    <div>
        <label>Телефон: <input type="text" th:field="*{phone}"/></label>
        <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color:red"></div>
    </div>
    <div>
        <label>Адрес: <input type="text" th:field="*{address}"/></label>
    </div>
    <div>
        <label>Группа:
            <select th:field="*{groupId}">
                <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"></option>
            </select>
        </label>
        <div th:if="${#fields.hasErrors('groupId')}" th:errors="*{groupId}" style="color:red"></div>
    </div>
    <div>
        <label>Факультет:
            <select th:field="*{facultyId}">
                <option th:each="f : ${faculties}" th:value="${f.id}" th:text="${f.name}"></option>
            </select>
        </label>
        <div th:if="${#fields.hasErrors('facultyId')}" th:errors="*{facultyId}" style="color:red"></div>
    </div>
    <div>
        <label>Курс: <input type="number" th:field="*{course}"/></label>
    </div>
    <div>
        <label>Средний балл: <input type="number" step="0.01" th:field="*{averageScore}"/></label>
    </div>
    <div>
        <label>Специальность: <input type="text" th:field="*{specialty}"/></label>
    </div>
    <div>
        <input type="submit" value="💾 Сохранить"/>
        <input type="reset" value="🔄 Сброс"/>
    </div>
</form>
<br>
<a th:href="@{/students}">⬅️ Назад к списку</a>
</body>
</html>
