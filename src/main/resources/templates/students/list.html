<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список студентов</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Список студентов</h1>
<a th:href="@{/students/create}">➕ Добавить студента</a>
<br><br>

<!-- Форма поиска -->
<form th:action="@{/students/search}" method="post">
    <label>Фамилия: <input type="text" name="lastName" th:value="${lastName}"></label>
    <label>Группа:
        <select name="groupId">
            <option value="">Все</option>
            <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}" th:selected="${groupId != null and groupId == g.id}"></option>
        </select>
    </label>
    <label>Факультет:
        <select name="facultyId">
            <option value="">Все</option>
            <option th:each="f : ${faculties}" th:value="${f.id}" th:text="${f.name}" th:selected="${facultyId != null and facultyId == f.id}"></option>
        </select>
    </label>
    <input type="submit" value="🔍 Поиск">
</form>
<br>

<table>
    <thead>
    <tr>
        <th>Фамилия</th>
        <th>Имя</th>
        <th>Отчество</th>
        <th>Пол</th>
        <th>Возраст</th>
        <th>Группа</th>
        <th>Факультет</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${students}">
        <td th:text="${s.lastName}"></td>
        <td th:text="${s.firstName}"></td>
        <td th:text="${s.middleName}"></td>
        <td th:text="${s.gender}"></td>
        <td th:text="${s.age}"></td>
        <td th:text="${s.group != null ? s.group.name : ''}"></td>
        <td th:text="${s.faculty != null ? s.faculty.name : ''}"></td>
        <td>
            <a th:href="@{/students/details/{id}(id=${s.id})}">📄 Детали</a>
            <a th:href="@{/students/edit/{id}(id=${s.id})}">✏️ Редактировать</a>
            <a th:href="@{/students/delete/{id}(id=${s.id})}" onclick="return confirm('Удалить студента?')">🗑️ Удалить</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
